[project]
name = "webpage_converter"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "cairosvg>=2.8.2",
    "commentjson>=0.9.0",
    "loguru>=0.7.3",
    "lxml>=6.0.2",
    "lxml-html-clean>=0.4.3",
    "overrides>=7.7.0",
    "py-asciimath>=0.3.0",
    "pylatexenc>=2.10",
    "regex>=2025.11.3",
    "selectolax>=0.4.6",
    "lark>=1.2.2",
    "lark-parser>=0.7.8"
]

[tool.setuptools.packages.find]
where = ["src"]

[[tool.uv.index]]
name = "tuna"
url = "https://pypi.tuna.tsinghua.edu.cn/simple/"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pre-commit>=4.5.1",
    "ruff>=0.14.11",
]
