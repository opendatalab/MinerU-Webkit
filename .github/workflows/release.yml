name: Publish Python Package

on:
  push:
    tags:
      - '*released'

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv and bump-my-version
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          uv tool install bump-my-version

      - name: Install dependencies
        run: uv sync

      - name: Get bump_type
        id: determine_bump
        run: |
          CURRENT_VERSION=$(bump-my-version show current_version)
          echo "当前版本: $CURRENT_VERSION"

          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
          PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)

          echo "主版本号: $MAJOR, 次版本号: $MINOR, 修订号: $PATCH"

          if [ "$PATCH" -eq 9 ]; then
            echo "修订号为9，触发次版本号升级"
            echo "bump_type=minor" >> $GITHUB_OUTPUT
          elif [ "$MINOR" -eq 9 ]; then
            echo "次版本号为9，触发主版本号升级"
            echo "bump_type=major" >> $GITHUB_OUTPUT
          else
            echo "默认触发修订号升级"
            echo "bump_type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Update Version and Commit
        id: bump
        run: |
          bump-my-version bump ${{ steps.determine_bump.outputs.bump_type }} --commit --tag --message "Bump version: {current_version} → {new_version}"
        env:
          GIT_AUTHOR_NAME: "github-actions[bot]"
          GIT_AUTHOR_EMAIL: "github-actions[bot]@users.noreply.github.com"

      - name: Push changes
        run: |
          git push origin main
          git push --tags

  build-and-release:
    needs: bump-version
    if: always() && (needs.bump-version.result == 'success' || github.event_name == 'push')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build wheel
        run: |
          uv build
          mv dist/*.whl ../../
          mv dist/*.tar.gz ../../

      - name: Get Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: MinerU-Webkit ${{ env.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            *.whl
            *.tar.gz
          token: ${{ secrets.RELEASE_TOKEN }}
